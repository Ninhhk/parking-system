services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: parking-lot-postgres
    environment:
      TZ: Asia/Ho_Chi_Minh
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-parking_lot}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - parking-lot-network
    restart: unless-stopped

  # Database migrations (idempotent SQL under db/init)
  db-migrate:
    image: postgres:16-alpine
    container_name: parking-lot-db-migrate
    environment:
      TZ: Asia/Ho_Chi_Minh
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-parking_lot}
    volumes:
      - ./db/init:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        for f in /migrations/*.sql; do
          echo "Applying migration: $$f"
          PGPASSWORD="$$DB_PASSWORD" psql \
            -h "$$DB_HOST" \
            -p "$$DB_PORT" \
            -U "$$DB_USER" \
            -d "$$DB_NAME" \
            -v ON_ERROR_STOP=1 \
            -f "$$f"
        done
        echo "All migrations applied successfully."
    networks:
      - parking-lot-network
    restart: "no"

  # License Plate Detection API (Python)
  lpd-service:
    build:
      context: .
      dockerfile: Dockerfile.lpd
    container_name: parking-lot-lpd
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LPD_API_PORT: 8000
      LPD_API_HOST: 0.0.0.0
      LPD_STAGE1_MODEL_PATH: /app/repo5/model/license_plate_detector.pt
      LPD_STAGE2_MODEL_PATH: /app/repo5/model/LP_ocr_yolov8.pt
    ports:
      - "8000:8000"
    volumes:
      - ./Licence-Plate-Detection-Recognition-Recording/repo5/model:/app/repo5/model:ro
      - ./Licence-Plate-Detection-Recognition-Recording/outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - parking-lot-network
    restart: unless-stopped

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: parking-lot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - parking-lot-network
    restart: unless-stopped

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: parking-lot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c
    command:
      - |
        set -e
        ATTEMPTS=0
        MAX_ATTEMPTS=3
        until mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
          ATTEMPTS=$$((ATTEMPTS + 1))
          if [ $$ATTEMPTS -ge $$MAX_ATTEMPTS ]; then
            echo "ERROR: Failed to configure MinIO client after $$MAX_ATTEMPTS attempts"
            exit 1
          fi
          echo "Retrying MinIO alias setup ($$ATTEMPTS/$$MAX_ATTEMPTS)..."
          sleep 5
        done
        ATTEMPTS=0
        until mc mb --ignore-existing myminio/parking-images; do
          ATTEMPTS=$$((ATTEMPTS + 1))
          if [ $$ATTEMPTS -ge $$MAX_ATTEMPTS ]; then
            echo "ERROR: Failed to create parking-images bucket after $$MAX_ATTEMPTS attempts"
            exit 1
          fi
          echo "Retrying bucket creation ($$ATTEMPTS/$$MAX_ATTEMPTS)..."
          sleep 5
        done
        echo "Bucket parking-images is ready."
        printf '%s' '{"Rules":[{"ID":"expire-parking-images-30d","Status":"Enabled","Expiration":{"Days":30},"Filter":{}}]}' | mc ilm import myminio/parking-images
        mc ilm rule list myminio/parking-images
        echo "Retention policy in place: parking-images objects expire 30 days after creation."
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - parking-lot-network
    restart: "no"

  # Backend API (Node.js)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: parking-lot-backend
    env_file:
      - ./be/.env
    environment:
      TZ: Asia/Ho_Chi_Minh
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-parking_lot}
      SALT: ${SALT:-barking-lot}
      SESSION_SECRET: ${SESSION_SECRET:-your-secret-key}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      LPD_API_URL: http://lpd-service:8000
      LPD_TIMEOUT: ${LPD_TIMEOUT:-30000}
      LPD_ENABLED: ${LPD_ENABLED:-true}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-http://localhost:3000/employee/checkout}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-http://localhost:3000/employee/checkout}
      PAYOS_WEBHOOK_PATH: ${PAYOS_WEBHOOK_PATH:-/api/payments/payos/webhook}
      PAYMENT_INTENT_V2_ENABLED: ${PAYMENT_INTENT_V2_ENABLED:-true}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_EXTERNAL_ENDPOINT: ${MINIO_EXTERNAL_ENDPOINT:-localhost}
      MINIO_EXTERNAL_PORT: "9000"
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      lpd-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - parking-lot-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  parking-lot-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
