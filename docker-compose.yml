services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: parking-lot-postgres
    environment:
      TZ: Asia/Ho_Chi_Minh
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-parking_lot}
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - parking-lot-network
    restart: unless-stopped

  # Database migrations (idempotent SQL under db/init)
  db-migrate:
    image: postgres:16-alpine
    container_name: parking-lot-db-migrate
    environment:
      TZ: Asia/Ho_Chi_Minh
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-parking_lot}
    volumes:
      - ./db/init:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        set -e
        for f in /migrations/*.sql; do
          echo "Applying migration: $$f"
          PGPASSWORD="$$DB_PASSWORD" psql \
            -h "$$DB_HOST" \
            -p "$$DB_PORT" \
            -U "$$DB_USER" \
            -d "$$DB_NAME" \
            -v ON_ERROR_STOP=1 \
            -f "$$f"
        done
        echo "All migrations applied successfully."
    networks:
      - parking-lot-network
    restart: "no"

  # License Plate Detection API (Python)
  lpd-service:
    build:
      context: .
      dockerfile: Dockerfile.lpd
    container_name: parking-lot-lpd
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      PLATE_MODEL_PATH: /app/models/best.pt
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LPD_API_PORT: 8000
      LPD_API_HOST: 0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - ./Licence-Plate-Detection-Recognition-Recording/models:/app/models
      - ./Licence-Plate-Detection-Recognition-Recording/outputs:/app/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - parking-lot-network
    restart: unless-stopped

  # Backend API (Node.js)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: parking-lot-backend
    env_file:
      - ./be/.env
    environment:
      TZ: Asia/Ho_Chi_Minh
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-parking_lot}
      SALT: ${SALT:-barking-lot}
      SESSION_SECRET: ${SESSION_SECRET:-your-secret-key}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      LPD_API_URL: http://lpd-service:8000
      LPD_TIMEOUT: ${LPD_TIMEOUT:-30000}
      LPD_ENABLED: ${LPD_ENABLED:-true}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-http://localhost:3000/employee/checkout}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-http://localhost:3000/employee/checkout}
      PAYOS_WEBHOOK_PATH: ${PAYOS_WEBHOOK_PATH:-/api/payments/payos/webhook}
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      lpd-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - parking-lot-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  parking-lot-network:
    driver: bridge

volumes:
  postgres_data:
